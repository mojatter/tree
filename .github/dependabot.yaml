version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    ignore:
      # golang.org/x/term and x/sys started requiring go 1.25 from
      # v0.41 / v0.42; pin to the last 1.24-compatible line and only
      # accept patch updates until we move to Go 1.25.
      - dependency-name: "golang.org/x/term"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "golang.org/x/sys"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: gomod
    directory: /examples
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
