name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Concrete use cases and small examples
        make a feature much easier to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's currently in the way?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How would you like tree / tq to behave? CLI flags, query syntax,
        Go API additions, etc. Sketch the desired usage if you can.
      render: shell
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or rejected, and why.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links to related projects, prior art, or screenshots.
