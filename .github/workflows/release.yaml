name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  tests:
    uses: ./.github/workflows/tests.yaml

  release:
    needs:
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      -
        name: Get tag
        id: tag
        run: |
          tag="${GITHUB_REF##*/}"
          echo "tag=${tag}" >>${GITHUB_OUTPUT}
          echo "version=${tag#v}" >>${GITHUB_OUTPUT}
      -
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.tag }}
          TREE_HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.TREE_HOMEBREW_TAP_GITHUB_TOKEN }}
